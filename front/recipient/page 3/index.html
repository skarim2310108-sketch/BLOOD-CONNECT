<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Emergency Request</title>

  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>


<div class="navbar">
  <div class="left">
    <a href="#"><i class="fa-solid fa-arrow-left"></i> Back To Dashboard</a>
  </div>

  <div class="center">
    <div class="logo">
      <i class="fa-solid fa-droplet"></i>
      <span>Blood Connect</span>
    </div>
    <p>The Pulse of Precision</p>
  </div>

  <div class="right">
    <strong>Rahim Uddin</strong>
    <p>Recipient Portal</p>
  </div>
</div>


<div class="main">

  <h1>Post Emergency Blood Request</h1>
  <p class="subtitle">
    Fill in the details below to submit an urgent blood request to nearby donors in Bangladesh.
  </p>

  <div class="form-card">

    
    <div class="section-title">
      <span>1</span> Patient Information
    </div>

    <div class="form-grid">
      <div>
        <label>Patient Name *</label>
        <input type="text" placeholder="Enter patient's full name">
      </div>

      <div>
        <label>Age *</label>
        <input type="number" placeholder="e.g. 34">
      </div>

      <div>
        <label>Blood Group Needed *</label>
        <select>
          <option>Select blood group</option>
          <option>A+</option>
          <option>A-</option>
          <option>B+</option>
          <option>O+</option>
        </select>
      </div>

      <div>
        <label>Number of Bags/Units *</label>
        <input type="number" placeholder="e.g. 2">
      </div>
    </div>

    
    <div class="section-title">
      <span>2</span> Hospital & Location
    </div>

    <div class="form-grid">
      <div class="full">
        <label>Hospital Name *</label>
        <input type="text" placeholder="e.g. Dhaka Medical College Hospital">
      </div>

      <div>
        <label>District *</label>
        <select>
          <option>Select district</option>
          <option>Dhaka</option>
          <option>Chittagong</option>
          <option>Rajshahi</option>
        </select>
      </div>

      <div>
        <label>Hospital Address *</label>
        <input type="text" placeholder="Specific ward, building, or street">
      </div>
    </div>

    
    <button class="submit-btn">Submit Request</button>

  </div>

</div>

</body>
</html>
