<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal</title>
  <link rel="stylesheet" href="Admin.css" />
</head>
<body>

  
  <div class="page">

    
    <div class="card">

      
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#C8102E" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2Z"/>
        </svg>
      </div>

      
      <h1 class="title">Admin Portal</h1>
      <p class="subtitle">Blood Donation Management System</p>

      
      <form id="loginForm" novalidate>

        
        <div class="form-group" id="emailGroup">
          <label for="email">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m2 7 10 7 10-7"/>
            </svg>
            Email Address
          </label>
          <input
            type="email"
            id="email"
            placeholder="admin@bloodconnect.com"
            autocomplete="email"
          />
          <span class="error-msg" id="emailError"></span>
        </div>

        
        <div class="form-group" id="passGroup">
          <label for="password">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <span class="error-msg" id="passError"></span>
        </div>

        
        <button type="submit" class="btn-signin" id="signInBtn">Sign In</button>

        
        <div class="forgot">
          <a href="#">Forgot password?</a>
        </div>

      </form>
      
      <div class="change-role">
        <button type="button" id="changeRoleBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#888"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Change Role
        </button>
      </div>

    </div>
    
    <footer class="footer">
      <div class="footer-left">
        <span class="footer-brand">Blood connect</span>
        <span class="footer-copy">© 2024 Blood Connect. Your drop of Purpose.</span>
      </div>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Contact Support</a>
      </div>
    </footer>
    

  </div>
  
  <script>
    const form        = document.getElementById('loginForm');
    const emailInput  = document.getElementById('email');
    const passInput   = document.getElementById('password');
    const emailGroup  = document.getElementById('emailGroup');
    const passGroup   = document.getElementById('passGroup');
    const emailError  = document.getElementById('emailError');
    const passError   = document.getElementById('passError');
    const signInBtn   = document.getElementById('signInBtn');

    
    emailInput.addEventListener('input', function () {
      emailGroup.classList.remove('error');
      emailError.textContent = '';
    });
    passInput.addEventListener('input', function () {
      passGroup.classList.remove('error');
      passError.textContent = '';
    });

    
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      let valid = true;

      
      if (!emailInput.value.trim()) {
        emailGroup.classList.add('error');
        emailError.textContent = 'Email address is required.';
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        emailGroup.classList.add('error');
        emailError.textContent = 'Please enter a valid email address.';
        valid = false;
      }

      
      if (!passInput.value) {
        passGroup.classList.add('error');
        passError.textContent = 'Password is required.';
        valid = false;
      }

      if (!valid) return;

      
      signInBtn.disabled     = true;
      signInBtn.textContent  = 'Signing in…';

      await new Promise(r => setTimeout(r, 1400));

      signInBtn.disabled    = false;
      signInBtn.textContent = 'Sign In';
      alert('✅ Login successful! (demo)');
    });

    
    document.getElementById('changeRoleBtn').addEventListener('click', function () {
      alert('Role selector — coming soon!');
    });
  </script>

</body>
</html>
